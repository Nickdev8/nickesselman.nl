services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nickesselman-web
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3012
      ORIGIN: ${ORIGIN:-http://localhost:3012}
    ports:
      - '3012:3012'
    restart: unless-stopped

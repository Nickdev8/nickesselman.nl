services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nickesselman-web
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    ports:
      - '3000:3000'
    restart: unless-stopped
